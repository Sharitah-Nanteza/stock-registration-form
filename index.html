<!doctype html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock registration form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<style>

flex-direction: row;

<body>
  <div class="container my-3">
    <h1 class="text-center mb-4">Stock registration form</h1>
    <div class="row justify-content-centre">
      <div class="col">
        <form class="p-5 border rounded w-50 mx-auto p-4 bg-light pb-3">
          <div class="row mb-2">
            <label for="inputEmail3" class="col-sm-2 col-form-label">Business name</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" id="inputEmail3" placeholder="enter business name">
            </div>
          </div>
          <div class="row mb-3">
            <label for="dept" class="col-sm-2 col-form-label">Store</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" id="dept" placeholder="enter the Department">
            </div>
          </div>
          <div class="row mb-3">
            <label for="inputPassword3" class="col-sm-2 col-form-label">Date</label>
            <div class="col-sm-10">
              <input type="date" class="form-control" id="inputPassword3">
            </div>
          </div>

          <div class="table-responsive">

              <thead>
                <tr>
                  <th scope="col">No.</th>
                  <th scope="col">Item name</th>
                  <th scope="col">Item code</th>
                  <th scope="col">Description</th>
                  <th scope="col">Qty Received</th>
                  <th scope="col">Unit Price</th>
                  <th scope="col">Total cost</th>
                  <th scope="col">Supplier</th>
                  <th scope="col">Remarks</th>
                </tr>
              </thead>
              <tbody class="table-group-divider">
                <tr>
                  <th scope="row">1</th>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                </tr>
                <tr>
                  <th scope="row">2</th>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                </tr>
                <tr>
                  <th scope="row">3</th>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                </tr>
                <tr>
                  <th scope="row">4</th>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                </tr>
                <tr>
                  <th scope="row">5</th>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                </tr>
                <tr>
                  <th scope="row">6</th>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>

                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>
                </tr>

                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>

                  <td><input type="text" class="form-control"></td>
                  <td><input type="text" class="form-control"></td>

                </tr>
              </tbody>
            </table>
          </div>


          <div class="row mb-3 mt-4">
            <label for="stockvalue" class="col-sm-2 col-form-label">Total stock value</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" id="stockvalue" placeholder="enter the total stock value">
            </div>


            <div class="row mt-4">
              <div class="col">
                <label for="receivedby" class="form-label">Received by;</label>
                <input type="text" class="form-control" id="receivedby" aria-label="First name" />
              </div>

              <div class="col">
                <label for="checkedby" class="form-label">Checked by;</label>
                <input type="text" class="form-control" id="checkedby" aria-label="Last name" />
              </div>

              <div class="col">
                <label for="sign" class="form-label">Signature;</label>
                <input type="text" class="form-control" id="sign" aria-label="First name" />
              </div>
            </div>


            <div>
              <button
                style="background-color: grey;border-radius: 5px; padding: 10px;margin: 30px; margin-left: 200px; margin-top: 50px; border: none;"
                class="submit">Submit</button>
            </div>
